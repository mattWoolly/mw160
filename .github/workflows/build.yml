name: Build & Test

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libjack-jackd2-dev \
            ladspa-sdk \
            libfreetype-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libglu1-mesa-dev \
            mesa-common-dev

      - name: Cache FetchContent
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            deps-${{ runner.os }}-

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

      - name: Install pluginval
        run: |
          curl -sL -o pluginval.zip "https://github.com/Tracktion/pluginval/releases/download/v1.0.4/pluginval_${{ runner.os }}.zip"
          unzip -o pluginval.zip -d build
          if [ "$RUNNER_OS" = "Linux" ]; then
            chmod +x build/pluginval
          fi

      - name: Install Xvfb (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y xvfb

      - name: Validate VST3 with pluginval
        run: |
          VST3_PATH="build/MW160_artefacts/Release/VST3/MW160.vst3"
          if [ ! -d "$VST3_PATH" ]; then
            VST3_PATH="build/MW160_artefacts/VST3/MW160.vst3"
          fi
          if [ "$RUNNER_OS" = "Linux" ]; then
            xvfb-run -a build/pluginval --validate-in-process --strictness-level 5 --validate "$VST3_PATH"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            build/pluginval.app/Contents/MacOS/pluginval --validate-in-process --strictness-level 5 --validate "$VST3_PATH"
          fi
